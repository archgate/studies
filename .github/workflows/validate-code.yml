name: Validate Code

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build site
        run: npm run build
      - name: Study assets present
        run: |
          test -f studies/sentry-pr-review-friction/analyze_sentry_prs.py
          test -f studies/sentry-pr-review-friction/output/sentry_pr_friction_report.json
