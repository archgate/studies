name: Validate Code

on:
  pull_request:
  push:
    branches:
      - main

env:
  ARCHGATE_TELEMETRY: "0"

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build site
        run: npm run build
